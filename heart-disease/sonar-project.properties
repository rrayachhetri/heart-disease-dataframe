# ─────────────────────────────────────────────────────────────
# SonarQube project configuration – Heart Disease API
# Used by the Jenkins pipeline (sonar-scanner CLI)
# ─────────────────────────────────────────────────────────────

# Project identity
sonar.projectKey=heart-disease
sonar.projectName=Heart Disease API
sonar.projectVersion=1.0

# Sources – only scan application code, not data artefacts or notebooks
sonar.sources=src
sonar.language=py

# Exclude binary artefacts, raw data files, and virtual environment
sonar.exclusions=\
    **/__pycache__/**,\
    **/*.pyc,\
    .venv/**,\
    data/**,\
    models/*.joblib,\
    mlruns/**,\
    mlflow.db,\
    *.data,\
    processed.*.data,\
    reprocessed.*.data,\
    ui/**

# Test sources (none yet – placeholder for future tests)
# sonar.tests=tests
# sonar.test.inclusions=**/test_*.py,**/*_test.py

# Coverage – fed from pytest-cov output in the Jenkins pipeline
sonar.python.coverage.reportPaths=coverage.xml

# JUnit test results
sonar.python.xunit.reportPath=test-results.xml

# Python version hint
sonar.python.version=3.10

# Encoding
sonar.sourceEncoding=UTF-8

# Pull-request decoration (values injected by Jenkins Jenkinsfile at runtime)
# sonar.pullrequest.key=<PR number>
# sonar.pullrequest.branch=<source branch>
# sonar.pullrequest.base=<target branch>
